<body>

    <svg id="restaurantLayout" width="1500" height="900"></svg>


    <script>
        const svg = document.getElementById("restaurantLayout");

        const totalTables = 100;

        const columns = 10;
        const rows = 10;

        const startX = 80;
        const startY = 70;

        const spacingX = 145;
        const spacingY = 82;

        const tableRadius = 32;

        const svgNS = "http://www.w3.org/2000/svg";

        for (let i = 1; i <= totalTables; i++) {
            const col = (i - 1) % columns;
            const row = Math.floor((i - 1) / columns);

            const cx = startX + col * spacingX;
            const cy = startY + row * spacingY;

            const circle = document.createElementNS(svgNS, "circle");
            circle.setAttribute("class", "table");
            circle.setAttribute("data-table", i);
            circle.setAttribute("fill", "green");
            circle.setAttribute("cx", cx);
            circle.setAttribute("cy", cy);
            circle.setAttribute("r", tableRadius);

            circle.addEventListener("click", function () {
                const currentFill = this.getAttribute("fill");

                if (currentFill === "red") {
                    this.setAttribute("fill", "green");
                } else {
                    this.setAttribute("fill", "red");
                }
            });

            const label = document.createElementNS(svgNS, "text");
            label.setAttribute("class", "table-label");
            label.setAttribute("x", cx);
            label.setAttribute("y", cy);
            label.textContent = "Table " + i;

            svg.appendChild(circle);
            svg.appendChild(label);
        }


        function reset(num) {
            if (document.querySelector(".table[data-table='" + num + "']").style.fill === 'red') {
                document.querySelector(".table[data-table='" + num + "']").style.fill = "green"
            } else {
                document.querySelector(".table[data-table='" + num + "']").style.fill = "red"
            }
        }
    </script>


</body>
