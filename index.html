<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SVG Seating</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <h1>Restaurant tables</h1>

    <svg version="1.1" width="1200" height="900" xmlns="http://www.w3.org/2000/svg">



        <circle cx="150" cy="100" r="80" fill="green" id="table1">
            <animate attributeName="fill" from="green" to="red" dur="10s" fill="freeze" />

        </circle>
        <text x="150" y="100" font-size="25" text-anchor="middle" fill="white">Table 1</text>
    </svg>

    <svg width="200" height="200" viewBox="0 0 200 200">
        <circle id="circle" cx="100" cy="100" r="80" />
    </svg>

    <style>
        #circle {
            fill: red;
            animation: colorChange 10s linear forwards;
            cursor: pointer;
        }

        @keyframes colorChange {
            from {
                fill: red;
            }

            to {
                fill: green;
            }
        }

        /* This class forces it to stay green */
        .force-red {
            animation: none;
            fill: red;
        }
    </style>

    <script>
        const circle = document.getElementById("circle");

        circle.addEventListener("click", () => {
            // Stop animation and force green
            circle.classList.add("force-red");
        });
    </script>


</body>


</html>
